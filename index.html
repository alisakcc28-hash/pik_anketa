<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анкета на ПИК</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F0F5FB;
  --card: #ffffff;
  --border: #DDE8F5;
  --ink: #111D2C;
  --slate: #4A6580;
  --accent: #2563EB;
  --accent-soft: #EEF4FF;
  --accent2: #60A5FA;
  --green: #16A34A;
  --green-soft: #DCFCE7;
  --muted: #94A3B8;
  --input-bg: #F7FAFD;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 14px 16px 20px;
}

/* ── Шапка ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1040px;
  margin: 0 auto 12px;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.03em;
}
.header h1 span {
  color: var(--accent);
  background: var(--accent-soft);
  padding: 1px 8px;
  border-radius: 5px;
}
.prog {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
}
.prog-track {
  width: 120px; height: 5px;
  background: var(--border);
  border-radius: 100px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 100px;
  width: 0%;
  transition: width 0.35s ease;
}

/* ── Обёртка ── */
.wrap {
  max-width: 1040px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Карточка ── */
.card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 8px rgba(37,99,235,0.06), 0 0 0 0 transparent;
  padding: 13px 16px 12px;
  transition: box-shadow 0.2s;
}
.card:focus-within {
  box-shadow: 0 2px 16px rgba(37,99,235,0.10);
  border-color: #C3D8FF;
}

.sec-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.11em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sec-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Строка полей ── */
.row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.row + .row { margin-top: 9px; }

/* ── Поле ── */
.f { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
.f.w2 { flex: 2; }
.f.w15 { flex: 1.5; }
.f.w3 { flex: 3; }

.f > label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--slate);
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
}
.req { color: var(--accent); font-size: 11px; }

.f input[type="text"],
.f input[type="tel"],
.f input[type="date"],
.f input[type="time"],
.f input[type="datetime-local"] {
  width: 100%;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 11px;
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  -webkit-appearance: none;
  line-height: 1;
}
.f input:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
}
.f input::placeholder {
  color: var(--muted);
  font-size: 12px;
  font-weight: 400;
}

/* ── Пилюли ── */
.pills { display: flex; flex-wrap: wrap; gap: 5px; }
.pill { position: relative; }
.pill input { position: absolute; opacity: 0; width: 0; height: 0; }
.pill label {
  display: inline-flex;
  align-items: center;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--slate);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  line-height: 1;
  user-select: none;
}
.pill input:checked + label {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 700;
}
.pill label:hover {
  border-color: var(--accent2);
  background: #F0F7FF;
  color: var(--accent);
}

/* ── Подтверждения ── */
.confirms {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 10px;
  background: #F8FBF9;
  border: 1.5px solid #BBF0D1;
  border-radius: 9px;
  padding: 10px 14px;
}
.ci {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.ci input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--green);
  cursor: pointer;
  flex-shrink: 0;
}
.ci span {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.45;
  font-weight: 400;
}
.ci span strong { font-weight: 700; color: var(--ink); }

/* ── Кнопки ── */
.btns {
  display: flex;
  gap: 8px;
  max-width: 1040px;
  margin: 4px auto 0;
}
.btn-send {
  flex: 1;
  background: linear-gradient(135deg, #1D58D8 0%, #3B82F6 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.01em;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(37,99,235,0.30);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-send:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(37,99,235,0.40); }
.btn-send:active { transform: translateY(0); }
.btn-send:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.btn-clear {
  background: var(--card);
  color: var(--slate);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-clear:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-soft); }

/* ── Статус ── */
#status {
  display: none;
  max-width: 1040px;
  margin: 7px auto 0;
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 13.5px;
  text-align: center;
}
#status.ok {
  background: var(--green-soft);
  border: 1.5px solid #86EFAC;
  color: #15803D;
}
#status strong { font-size: 15px; display: block; margin-bottom: 2px; font-weight: 700; }

@media (max-width: 700px) {
  .row { flex-wrap: wrap; }
  .f, .f.w2, .f.w15, .f.w3 { min-width: calc(50% - 5px); }
}
</style>
</head>
<body>

<div class="header">
  <h1>Анкета на <span>ПИК</span></h1>
  <div class="prog">
    <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
    <span id="pp">0%</span>
  </div>
</div>

<form id="form">
<div class="wrap">

<!-- 1 Контакт -->
<div class="card">
  <div class="sec-title">👤 Контакт</div>
  <div class="row">
    <div class="f">
      <label>Дата и время звонка <span class="req">*</span></label>
      <input type="datetime-local" name="call_datetime" id="call_datetime">
    </div>
    <div class="f">
      <label>Телефон клиента <span class="req">*</span></label>
      <input type="tel" name="phone" placeholder="+7 900 000 00 00">
    </div>
    <div class="f">
      <label>Имя клиента <span class="req">*</span></label>
      <input type="text" name="first_name" placeholder="Имя">
    </div>
    <div class="f">
      <label>Оператор <span class="req">*</span></label>
      <input type="text" name="operator_name" placeholder="Ваше имя">
    </div>
  </div>
</div>

<!-- 2 Объект -->
<div class="card">
  <div class="sec-title">🏙️ Объект и перезвон</div>
  <div class="row">
    <div class="f w3">
      <label>Жилой комплекс <span class="req">*</span></label>
      <input type="text" name="complex_name" placeholder="Название ЖК">
    </div>
    <div class="f">
      <label>Дата перезвона <span class="req">*</span></label>
      <input type="date" name="callback_date">
    </div>
    <div class="f">
      <label>Время перезвона <span class="req">*</span></label>
      <input type="time" name="callback_time">
    </div>
  </div>
</div>

<!-- 3 Параметры -->
<div class="card">
  <div class="sec-title">🛋️ Параметры квартиры</div>
  <div class="row">
    <div class="f w2">
      <label>Комнат <span class="req">*</span></label>
      <div class="pills">
        <div class="pill"><input type="radio" name="rooms" id="r0" value="Студия"><label for="r0">Студия</label></div>
        <div class="pill"><input type="radio" name="rooms" id="r1" value="1к"><label for="r1">1к</label></div>
        <div class="pill"><input type="radio" name="rooms" id="r2" value="2к"><label for="r2">2к</label></div>
        <div class="pill"><input type="radio" name="rooms" id="r3" value="3к"><label for="r3">3к</label></div>
        <div class="pill"><input type="radio" name="rooms" id="r4" value="4к+"><label for="r4">4к+</label></div>
        <div class="pill"><input type="radio" name="rooms" id="r5" value="Не определился"><label for="r5">Не определился</label></div>
      </div>
    </div>
    <div class="f w2">
      <label>Отделка</label>
      <div class="pills">
        <div class="pill"><input type="radio" name="finishing" id="f1" value="Без отделки"><label for="f1">Без</label></div>
        <div class="pill"><input type="radio" name="finishing" id="f2" value="White box"><label for="f2">White box</label></div>
        <div class="pill"><input type="radio" name="finishing" id="f3" value="Чистовая"><label for="f3">Чистовая</label></div>
        <div class="pill"><input type="radio" name="finishing" id="f4" value="С мебелью"><label for="f4">С мебелью</label></div>
        <div class="pill"><input type="radio" name="finishing" id="f5" value="Не важно"><label for="f5">Не важно</label></div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="f">
      <label>Бюджет <span class="req">*</span></label>
      <input type="text" name="budget" placeholder="Пример: 8 млн">
    </div>
    <div class="f">
      <label>Срок сдачи</label>
      <input type="text" name="delivery_period" placeholder="2026, не важно">
    </div>
    <div class="f w2">
      <label>Способ оплаты <span class="req">*</span></label>
      <input type="text" name="payment_method" placeholder="Ипотека / 100% / рассрочка">
    </div>
  </div>
</div>

<!-- 4 Финансы + Квалификация -->
<div class="card">
  <div class="sec-title">💳 Финансы и квалификация</div>

  <!-- строка 1: ПВ + размер + способ покупки -->
  <div class="row">
    <div class="f">
      <label>Первоначальный взнос</label>
      <div class="pills">
        <div class="pill"><input type="radio" name="down_payment_yn" id="dp1" value="Есть ПВ"><label for="dp1">Есть</label></div>
        <div class="pill"><input type="radio" name="down_payment_yn" id="dp2" value="Нет ПВ"><label for="dp2">Нет</label></div>
      </div>
    </div>
    <div class="f">
      <label>Размер взноса</label>
      <input type="text" name="down_payment_amount" placeholder="1,5 млн / 20%">
    </div>
    <div class="f">
      <label>Покупка в течение 2 месяцев?</label>
      <div class="pills">
        <div class="pill"><input type="radio" name="buy_in_2mo" id="b1" value="Да"><label for="b1">✅ Да</label></div>
        <div class="pill"><input type="radio" name="buy_in_2mo" id="b2" value="Нет, позже"><label for="b2">❌ Нет, позже</label></div>
        <div class="pill"><input type="radio" name="buy_in_2mo" id="b3" value="Не определился"><label for="b3">Не определился</label></div>
      </div>
    </div>
  </div>

  <!-- строка 2: ПИК -->
  <div class="row">
    <div class="f">
      <label>Обращался к застройщику ПИК за последние 4 месяца?</label>
      <div class="pills">
        <div class="pill"><input type="radio" name="pik_contact" id="pik1" value="Нет — не обращался"><label for="pik1">✅ Нет, не обращался</label></div>
        <div class="pill"><input type="radio" name="pik_contact" id="pik2" value="Да — обращался"><label for="pik2">⚠️ Да, обращался</label></div>
        <div class="pill"><input type="radio" name="pik_contact" id="pik3" value="Не знает"><label for="pik3">Не знает</label></div>
      </div>
    </div>
  </div>

  <!-- строка 3: комментарий -->
  <div class="row">
    <div class="f">
      <label>Комментарий</label>
      <input type="text" name="comment" placeholder="Доп. информация по клиенту...">
    </div>
  </div>

  <!-- подтверждения -->
  <div class="confirms">
    <label class="ci"><input type="checkbox" id="cc1" required><span>Клиент <strong>понимает</strong>, что ему перезвонит менеджер</span></label>
    <label class="ci"><input type="checkbox" id="cc2" required><span>Клиент <strong>готов рассматривать варианты</strong> и смотреть подборку</span></label>
    <label class="ci"><input type="checkbox" id="cc3" required><span>Время перезвона <strong>согласовано и подтверждено</strong> клиентом</span></label>
  </div>
</div>

</div><!-- /wrap -->

<div class="btns">
  <button type="submit" class="btn-send" id="submitBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    Отправить анкету
  </button>
  <button type="button" class="btn-clear" onclick="resetForm()">↺ Очистить</button>
</div>
</form>

<div id="status"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAOI33uBauHnHqJVCmjuroNbACJJqsk-Tujgutfq1cPLyx49U_b2W4sBjq98y55jXViw/exec';

function pad(n){ return String(n).padStart(2,'0'); }
function nowLocal(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
document.getElementById('call_datetime').value = nowLocal();

function updateProgress(){
  const f = document.getElementById('form');
  const checks = [
    f.call_datetime?.value, f.phone?.value, f.first_name?.value, f.operator_name?.value,
    f.complex_name?.value, f.callback_date?.value,
    f.querySelector('[name="rooms"]:checked'),
    f.budget?.value, f.payment_method?.value,
    f.querySelector('[name="pik_contact"]:checked'),
  ];
  const pct = Math.round(checks.filter(Boolean).length / checks.length * 100);
  document.getElementById('pf').style.width = pct + '%';
  document.getElementById('pp').textContent = pct + '%';
}
document.getElementById('form').addEventListener('input', updateProgress);
document.getElementById('form').addEventListener('change', updateProgress);
updateProgress();

function collectData(){
  const f = document.getElementById('form');
  const g = n => f.querySelector(`[name="${n}"]`)?.value || '';
  const r = n => f.querySelector(`[name="${n}"]:checked`)?.value || '';
  const cd = g('callback_date'), ct = g('callback_time');
  return {
    call_datetime: g('call_datetime'), phone: g('phone'),
    first_name: g('first_name'), last_name: '',
    complex_name: g('complex_name'),
    callback_datetime: cd && ct ? cd + ' ' + ct : cd || ct,
    rooms: r('rooms'), budget: g('budget'), finishing: r('finishing'),
    delivery_period: g('delivery_period'), payment_method: g('payment_method'),
    mortgage: '', down_payment_yn: r('down_payment_yn'),
    down_payment_amount: g('down_payment_amount'), buy_in_2mo: r('buy_in_2mo'),
    pik_contact: r('pik_contact'), operator_name: g('operator_name'), comment: g('comment'),
  };
}

function validate(){
  const d = collectData();
  if(!d.phone){ alert('Укажите телефон'); return false; }
  if(!d.first_name){ alert('Укажите имя клиента'); return false; }
  if(!d.operator_name){ alert('Укажите имя оператора'); return false; }
  if(!d.complex_name){ alert('Укажите ЖК'); return false; }
  if(!d.callback_datetime){ alert('Укажите дату и время перезвона'); return false; }
  if(!d.rooms){ alert('Выберите количество комнат'); return false; }
  if(!d.budget){ alert('Укажите бюджет'); return false; }
  if(!d.payment_method){ alert('Укажите способ оплаты'); return false; }
  if(!document.getElementById('cc1').checked||!document.getElementById('cc2').checked||!document.getElementById('cc3').checked){
    alert('Отметьте все три подтверждения'); return false;
  }
  return true;
}

document.getElementById('form').addEventListener('submit', async function(e){
  e.preventDefault();
  if(!validate()) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Отправляю...';
  const data = collectData();
  try { await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body:JSON.stringify(data), headers:{'Content-Type':'text/plain'} }); } catch(e){}
  const st = document.getElementById('status');
  st.style.display = 'block'; st.className = 'ok';
  st.innerHTML = `<strong>✅ Анкета отправлена!</strong>Данные клиента ${data.first_name} — в работе.`;
  document.getElementById('form').reset();
  document.getElementById('call_datetime').value = nowLocal();
  updateProgress();
  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Отправить анкету';
  setTimeout(()=>{ st.style.display='none'; }, 5000);
});

function resetForm(){
  if(!confirm('Очистить форму?')) return;
  document.getElementById('form').reset();
  document.getElementById('call_datetime').value = nowLocal();
  document.getElementById('status').style.display = 'none';
  updateProgress();
}
</script>
</body>
</html>
